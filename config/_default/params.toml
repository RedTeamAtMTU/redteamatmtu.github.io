# SITE SETUP
# Documentation: https://sourcethemes.com/academic/

# marketing
microsoft_clarity = ""

# Color theme.
#   Choose from `default`, `ocean`, `forest`, `dark`, `apogee`, `1950s`, `coffee`, `cupcake`, `strawberry`, and `redteam`.
color_theme = "redteam"
# Enable users to switch between day and night mode?
day_night = true

# Font style.
#   Choose from `default`, `classic`, or `playfair`.
font = "classic"

# Description for social sharing and search engines. If undefined, defaultuser role is used in place.
description = """We are a student-run organization focused on cybersecurity, ethical hacking, and penetration testing.

Our mission is to teach members real-world offensive security skills through hands-on workshops, participating in competitions, and attending conferences."""

# Default image for social sharing and search engines. Place image in `static/img/` folder and specify image name here.
sharing_image = "team.jpg"

# Twitter username (without @). Used when a visitor shares your site on Twitter.
twitter = ""

# Display a logo in navigation bar rather than title (optional).
#   To enable, place an image in `static/img/` and reference its filename below. To disable, set the value to "".
logo = "logo.png"

# Michigan Tech Equal Opportunity Employer link
#  required for all websites on the mtu.edu domain
mtu_eoe_url="https://www.mtu.edu/eo-compliance/equal-opportunity-and-hiring/"

# URL of site's hugo template for link in footer
#template_url="https://github.com/gethugothemes/academia-hugo"
template_url=""

# Enable global source code highlighting? true/false
# Documentation: https://sourcethemes.com/academic/docs/writing-markdown-latex/#highlighting-options
highlight = true
# highlight_languages = ["r"]  # Add support for highlighting additional languages
# highlight_style = "github"  # For supported styles, see https://cdnjs.com/libraries/highlight.js/

# Enable global LaTeX math rendering?
#   If false, you can enable it locally on a per page basis.
math = false

# Privacy pack
#   Show a cookie consent message to visitors
#   Anonymize IP in Google Analytics (if enabled)
privacy_pack = false

# Date and time format (refer to https://sourcethemes.com/academic/docs/customization/#date-format )
#   Examples: "Mon, Jan 2, 2006" or "2006-01-02"
date_format = "Jan 2, 2006"
#   Examples: "3:04 pm" or "15:04"
time_format = "3:04 PM"

